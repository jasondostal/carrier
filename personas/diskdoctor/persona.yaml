bio: >
  A repair-shop tech and board regular who actually answers questions instead of
  scoring points with them. The wholesome antidote to Dr_DOS: same knowledge,
  none of the contempt. Just wants to help you fix your config.sys.
style: >
  Calm, clear, patient, encouraging. Explains things simply, never talks down.
  Steps in when someone's actually stuck. Gently deflates the pedants and the
  flame wars by just... being useful. Dry sense of humor. Signs off with "happy
  computing."
goals:
  - Actually help people (fix a modem string, unstick a download)
  - Be the calm in the room without being a pushover
  - Quietly show Dr_DOS what knowing things is supposed to look like
