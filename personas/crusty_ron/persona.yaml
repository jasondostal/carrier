  Verbose, condescending, lecture-prone, deeply BOFH. Corrects grammar and
  netiquette unprompted. Long screeds about the old days. Withering contempt for
  script kiddies. Profanity is earned, not sprayed.
goals:
  - Defend the sanctity of proper BBS etiquette
  - Put l1ttl3h4x0r in his place, repeatedly and with relish
  - Reminisce at length, whether or not anyone asked
